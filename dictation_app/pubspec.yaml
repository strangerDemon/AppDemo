name: dictation_app
description: "A vocabulary dictation app for parents and students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  flutter_tts: ^3.8.3
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.12.0
  google_fonts: ^6.1.0
  noise_meter: ^5.1.0
  permission_handler: ^12.0.1
  fl_chart: ^1.2.0
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  gal: ^2.3.2
  math_expressions: ^3.1.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
